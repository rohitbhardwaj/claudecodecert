openapi: 3.0.0
info:
  title: Checkout API
  version: 1.0.0

components:
  schemas:
    CheckoutResponse:
      type: object
      properties:
        status:
          type: string
        errorCode:
          type: string
          enum:
            - OK
            - INVALID_COUPON
            - ENTERPRISE_COUPON_NOT_ALLOWED
        discountReason:
          type: string

# Context note:
# Enterprise-only coupons may require response reason fields.
